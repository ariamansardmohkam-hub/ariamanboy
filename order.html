<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ثبت سفارش</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>ثبت سفارش</h1>

<p id="selectedCP"></p>

<input id="uid" placeholder="UID">
<input id="username" placeholder="Username">

<button onclick="sendOrder()">ثبت سفارش</button>

<script>
const params = new URLSearchParams(window.location.search);
const cp = params.get("cp");

document.getElementById("selectedCP").innerText = "پکیج انتخاب شده: " + cp + " CP";

async function sendOrder() {
    const uid = document.getElementById("uid").value;
    const username = document.getElementById("username").value;

    if (!uid || !username) {
        alert("همه فیلدها را پر کنید");
        return;
    }

    await fetch("https://script.google.com/macros/s/AKfycbxgz0ESIRcyJFJtphIC_Hn_YhfFgvhzo2_360PrQgJ_HjQ-iotRYnCP7bBz8X7_mEtj/exec", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            uid: uid,
            username: username,
            cp: cp
        })
    });

    alert("سفارش ثبت شد");
}
</script>

</body>
</html>
