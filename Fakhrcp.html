<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fakhr CP</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>خرید سی پی کالاف</h1>

<div class="card">
    <h2>80 CP</h2>
    <div class="price">209,500 تومان</div>
    <button onclick="buy(80)">خرید</button>
</div>

<div class="card">
    <h2>420 CP</h2>
    <div class="price">699,000 تومان</div>
    <button onclick="buy(420)">خرید</button>
</div>

<div class="card">
    <h2>880 CP</h2>
    <div class="price">1,250,000 تومان</div>
    <button onclick="buy(880)">خرید</button>
</div>

<div class="card">
    <h2>1200 CP</h2>
    <div class="price">1,650,000 تومان</div>
    <button onclick="buy(1200)">خرید</button>
</div>

<script>
function buy(cp) {
    window.location.href = "order.html?cp=" + cp;
}
</script>

</body>
</html>
