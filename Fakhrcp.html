<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fakhr CP Shop</title>

<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="fakhrcp.png" class="logo" alt="Fakhr CP">
    <h1>⚡ Fakhr CP Shop</h1>
</header>

<div class="box">

    <input id="cp" type="number" placeholder="مقدار CP را وارد کن">

    <div class="price" id="price">قیمت: 0 تومان</div>

    <button onclick="buy()">خرید سریع</button>

    <div class="quick">
        <button onclick="setCP(80)">80 CP</button>
        <button onclick="setCP(420)">420 CP</button>
        <button onclick="setCP(880)">880 CP</button>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
