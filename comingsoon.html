<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>در حال تکمیل</title>

<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:"Vazirmatn",sans-serif;
    background:#000;
    color:#00ff99;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.box{
    padding:30px;
    border:1px solid #00ff99;
    border-radius:20px;
    box-shadow:0 0 25px #00ff9950;
    background:#111;
}

h1{
    font-size:30px;
}

p{
    color:#aaa;
}
</style>
</head>
<body>

<div class="box">
    <h1>🚧 این بخش سایت هنوز کامل نشده</h1>
    <p>به‌زودی سیستم سفارش و پرداخت فعال می‌شود.</p>
</div>

</body>
</html>
